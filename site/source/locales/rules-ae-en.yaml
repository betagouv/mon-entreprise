entreprise . imposition . IS:
  description.en: >-
    [automatic] 

    Your company's **results** are subject to corporate income tax.


    If your company loses money, the result is called a **deficit**. It

    will not have to pay corporate income tax.


    If your company makes money, the result is called **profit**.

    It will be taxed at a **fixed rate**.


    Taxable income is determined when you fill out your **liasse fiscale** (tax return).

    (also known as an income tax return). This is done by the chartered accountant.



    Please note: there are **two ways to earn income** with a company that pays income tax

    company:
      - You can pay yourself a salary as a director during the year.
      the year. This remuneration is deducted (subtracted) from your income to calculate
      your company's taxable profit. On the other hand, this remuneration is
      added to your household's taxable income for income tax purposes.
      income tax.
      - You can also pay yourself dividends from previous years' profits.
      previous years. You will have to pay a fixed tax on these: this is known as the "flat tax".
      known as "flat tax".

      In all cases, you will have to pay **social contributions** on the income you
      income you receive.
  description.fr: >-

    Le **résultat** de votre entreprise est imposé à l’**impôt sur les sociétés**.


    Si votre entreprise perd de l’argent, le résultat est appelé **déficit**. Elle

    n’aura pas à payer d’impôt sur les sociétés.


    Si votre entreprise gagne de l’argent, le résultat est appelé **bénéfice**.

    Il sera imposé à un **taux fixe**.


    Le résultat imposable est déterminé lors du remplissage de la **liasse fiscale**

    (aussi appelée déclaration de résultat). C’est l’expert-comptable qui s’en charge.



    À noter : il existe **deux façons de se rémunérer** avec une entreprise à l’impôt

    sur les sociétés :
      - Vous pouvez vous verser une rémunération en tant que dirigeant pendant
      l’année. Cette rémunération est déduite (soustraite) du résultat pour calculer
      le bénéfice imposable de votre entreprise. En revanche, cette rémunération est
      ajoutée aux revenus imposables de votre foyer pour le calcul de l’impôt sur le
      revenu.
      - Vous pouvez aussi vous verser des dividendes à partir des bénéfices des
      années précédentes. Vous aurez à payer un impôt fixe sur ces derniers : c’est
      ce que l’on appelle la "flat tax".

      Dans tous les cas, vous aurez à payer des **cotisations sociales** sur les
      revenus que vous touchez.
