assimilé salarié . exonérations . JEI:
  description.en: >-
    [automatic] The Young Innovative Company (JEI) status was created by the
    French Finance Act for 2004, and enables SMEs under 8 years of age devoting
    at least 20% of their costs to R&amp;D to benefit from an exemption from
    social security contributions.


    The exemption can be applied to remuneration paid to :

    - employees for whom the employer is liable to pay unemployment insurance contributions

    - corporate officers who are principally involved in the company's research and development project


    By way of simplification, an employee's entitlement to the exemption will be deemed acquired when at least half of his or her working time is devoted to one or more research and development projects, and the exemption cannot be called into question.
  description.fr: >-
    Le statut de jeune entreprise innovante (JEI) a été créé par la loi de
    finances pour 2004 et permet aux PME de moins de 8 ans consacrant 20% au
    moins de leurs charges à de la Recherche et Développement de bénéficier
    d'une exonération de cotisations sociales.


    L’exonération peut s’appliquer sur les rémunérations versées :

    - aux salariés pour lesquels l’employeur est soumis à l’obligation d’assurance chômage

    - aux mandataires sociaux qui participent, à titre principal, au projet de recherche et de développement de l’entreprise


    Par simplification, le bénéfice de l’exonération au titre d’un salarié sera considéré comme acquis dès lors que la moitié de son temps de travail au moins est consacrée à un ou des projets de recherche et de développement et l’exonération ne pourra être remise en cause.
  question.en:
    '[automatic] Do you qualify for the Young Innovative Company (JEI)
    tax exemption?'
  question.fr: Bénéficiez-vous de l'exonération Jeune Entreprise Innovante (JEI) ?
  titre.en: '[automatic] JEI'
  titre.fr: JEI
