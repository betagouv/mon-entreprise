auto-entrepreneur:
  description.en: >
    [automatic] The auto-entreprise is a simplified sole proprietorship.
    Originally known

    under the name "auto-entrepreneur", the "micro-entrepreneur" scheme is a self-employed

    a self-employed worker scheme created to simplify administrative

    by replacing all social security contributions with a single monthly deduction.

    single monthly deduction.
  description.fr: >
    L’auto-entreprise est une entreprise individuelle simplifiée. À l’origine
    connu

    sous l’appellation « auto-entrepreneur », le régime de « micro-entrepreneur » est

    un régime de travailleur indépendant créé pour simplifier la gestion

    administrative, notamment en remplaçant toutes les cotisations sociales par un

    prélèvement unique mensuel.
  titre.en: '[automatic] auto-entrepreneur'
  titre.fr: auto-entrepreneur
auto-entrepreneur . Cipav:
  avec:
    adhérent:
      description.en: >
        [automatic] Since January 1, 2018, self-employed workers in unregulated
        liberal professions

        are affiliated to Sécurité sociale pour les indépendants (SSI).


        Unregulated self-employed self-employed professionals created before January 1

        January 2018, who were members of Cipav, remain members of Cipav.


        The auto-entrepreneurs concerned do, however, have a right of option

        for five years to join the Sécurité sociale pour les indépendants

        (SSI).
      description.fr: >
        Depuis le 1er janvier 2018, les auto-entreprises d’activité libérale non

        réglementée sont affiliées à la Sécurité sociale pour les indépendants (SSI).


        Les auto-entreprises d’activité libérale non réglementée créées avant le 1er

        janvier 2018, qui étaient adhérentes à la Cipav, demeurent à la Cipav.


        Les auto-entrepreneurs concernés disposent toutefois d’un droit d’option

        durant cinq ans afin de rejoindre la Sécurité sociale pour les indépendants

        (SSI).
      question.en: '[automatic] Are you a Cipav member?'
      question.fr: Êtes-vous adhérent à la Cipav ?
