protection sociale . retraite:
  description.en: >
    [automatic] ### A compulsory system ...

    As soon as you start working, you and your employer contribute to your pension scheme. This contribution is based on your salary.


    ###Pay-as-you-go

    The total amount of contributions you make each year is used to pay the pensions

    pensions for that same year. The system thus organizes a

    direct transfer from working generations to retired generations.


    ###Mainly contributory

    When you retire, your pension (i.e. your retirement "income") is calculated

    is calculated on the basis of your income, your retirement age and the number of years

    and the number of years you've worked.


    **Our pension system is also based on solidarity**: the unemployed, people on sick leave

    people on sick leave, people with disabilities, low-income workers

    low-income earners, women on maternity leave, etc., also acquire

    also acquire rights. No retired person is left destitute.

    without resources.



    Simulate and manage your retirement on [info-retraite.fr](https://www.info-retraite.fr/portail-info/home.html).
  description.fr: >
    ### Un système obligatoire …

    Dès lors que vous travaillez, vous et votre employeur, cotisez pour la retraite. Cette cotisation est définie à la mesure du salaire que vous percevez.


    ###… par répartition

    Le montant total des cotisations que vous versez chaque année sert à payer les

    pensions des retraités pour cette même année. Le système organise ainsi un

    transfert direct des générations en activité vers les générations à la retraite.


    ###… principalement contributif

    Lorsque vous arrivez à la retraite, votre pension (c’est-à-dire votre « revenu »

    à la retraite) est calculé en fonction de vos revenus, de votre âge de départ à

    la retraite et du nombre d’années passées à travailler.


    **Notre système de retraite est également solidaire** : les chômeurs, les

    personnes en arrêt maladie, les personnes en situation de handicap, les

    travailleurs touchant de faibles revenus, les femmes en congé maternité

    acquièrent également des droits. Aucune personne à la retraite n’est laissée

    sans ressources.



    Simulez et gérez votre retraite sur [info-retraite.fr](https://www.info-retraite.fr/portail-info/home.html).
  résumé.en: '[automatic] Guarantees an average of 60-70% of your last working
    income for your retirement pension.'
  résumé.fr:
    Garantit en moyenne 60 à 70 % du dernier revenu d’activité pour votre
    pension de retraite.
  titre.en: '[automatic] retirement'
  titre.fr: retraite
protection sociale . retraite . base:
  description.en: >
    [automatic] The amount of your basic retirement pension is calculated on the
    basis of your

    average of your earnings over the best 25 years and the number of quarters

    contributed.


    This **estimation** of your **maximum** basic retirement pension is

    calculated on the basis of the following assumptions:

    - The income you have entered corresponds to that of your

    **25 best years**;

    - You have had no change in income during your career;

    - You have no other sources of income;

    - You have contributed a sufficient number of quarters and are retiring at the age

    benefit from the **full rate**.


    > **Detailed calculation:** 50% x average annual income x pension pro rata

    >

    > With :

    > - average annual income_ = average of salaries and income contributed by

    > self-employed for the best 25 years of your career

    > career ;

    > - pension prorata_ = length of insurance with the French pension insurance scheme (Assurance Retraite) / length of insurance to obtain a full pension.

    > insurance period to obtain a full pension.
  description.fr: >
    Le montant de votre pension pour la retraite de base est calculé à partir de
    la

    moyenne de vos revenus des 25 meilleures années et du nombre de trimestres

    cotisés.


    Cette **estimation** de votre pension de retraite de base **maximum** est

    calculée avec les hypothèses suivantes :

    - La rémunération que vous avez saisie correspond à celle de vos

    **25 meilleures années** ;

    - Vous n’avez pas eu de variation de revenus au cours de votre carrière ;

    - Vous n’avez pas d’autres sources de revenus ;

    - Vous avez cotisé suffisamment de trimestres et vous partez à l’âge requis pour

    bénéficier du **taux plein**.


    > **Calcul détaillé :** 50% x revenu annuel moyen x prorata de pension

    >

    > Avec :

    > - _revenu annuel moyen_ = moyenne des salaires et des revenus cotisés de

    > travailleur indépendant pendant les 25 années les plus avantageuses de votre

    > carrière ;

    > - _prorata de pension_ = durée d’assurance auprès de l’Assurance retraite /

    > durée d’assurance pour obtenir une pension à taux plein.
  résumé.en: '[automatic] Full basic retirement pension based on the assumption
    that your salary has remained the same throughout your working life.'
  résumé.fr: Pension de retraite de base à taux plein en partant du principe que
    votre rémunération est restée la même pendant toute votre vie active.
