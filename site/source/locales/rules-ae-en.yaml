    retraite:
      description.en: >
        [automatic] Percentage of auto-entrepreneur contributions that go
        towards retirement

        ### A compulsory system ...

        As long as you're working, you and your employer contribute to your

        contributions. This contribution is based on the salary you receive.

        you receive.


        ###Pay-as-you-go

        The total amount of contributions you make each year is used to pay

        pensions for that same year. The pay-as-you-go

        system thus organizes a direct transfer from working generations to

        retired generations.


        ###Mainly contributory

        When you retire, your pension (i.e. your retirement "income") is

        retirement "income") is calculated on the basis of your income, your retirement age

        your retirement age and the number of years you've worked.

        working.


        **Our pension system is also based on solidarity**: the unemployed, people on sick leave

        people on sick leave, people with disabilities, low-income workers

        low-income earners, women on maternity leave, etc., also acquire

        also acquire rights. No retired person is left

        left destitute.


        Simulate and manage your retirement on

        [info-retraite.fr](https://www.info-retraite.fr/portail-info/home.html).
      description.fr: >
        Part des cotisations auto-entrepreneur qui alimentent la retraite

        ### Un système obligatoire …

        Dès lors que vous travaillez, vous et votre employeur, cotisez pour la

        retraite. Cette cotisation est définie à la mesure du salaire que vous

        percevez.


        ###… par répartition

        Le montant total des cotisations que vous versez chaque année sert à

        payer les pensions des retraités pour cette même année. Le système

        organise ainsi un transfert direct des générations en activité vers les

        générations à la retraite.


        ###… principalement contributif

        Lorsque vous arrivez à la retraite, votre pension (c’est-à-dire votre

        « revenu » à la retraite) est calculé en fonction de vos revenus, de

        votre âge de départ à la retraite et du nombre d’années passées à

        travailler.


        **Notre système de retraite est également solidaire** : les chômeurs, les

        personnes en arrêt maladie, les personnes en situation de handicap, les

        travailleurs touchant de faibles revenus, les femmes en congé maternité

        acquièrent également des droits. Aucune personne à la retraite n’est

        laissée sans ressources.


        Simulez et gérez votre retraite sur

        [info-retraite.fr](https://www.info-retraite.fr/portail-info/home.html).
      titre.en: '[automatic] retirement'
      titre.fr: retraite
