  description.en: >-
    [automatic] CSG and CRDS are payable by all employees meeting the following
    two conditions:

    - they are domiciled in France for tax purposes, - they are covered by a compulsory French health insurance scheme.

    If one of the two criteria is not met, CSG and CRDS are not due, provided proof is provided (tax receipt or social security card).
  description.fr: >-
    La CSG et la CRDS sont dues par tous les salariés remplissant les deux
    conditions suivantes :

    - ils sont domiciliés fiscalement en France, - ils sont à la charge d’un régime français d’assurance maladie obligatoire.

    Si l’un des deux critères n’est pas rempli, la CSG et la CRDS ne sont pas dues, à la condition d’en apporter la preuve (justificatif fiscal ou carte d’assuré social).
