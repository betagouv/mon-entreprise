    [automatic] Your company's income is subject to income tax, like your
    household's other income.

    other household income.


    The result is determined when you fill in the **liasse fiscale** (also known as the

    tax return). This is done by your chartered accountant.


    If your company makes money, the result is called **profit**. It

    is added to other taxable income (if any):

    **your income tax is higher**.


    If your company loses money, the result is called a **deficit**. It

    reduces your household's taxable income:

    **your income tax is lower**.


    Please note: with income tax, there is no tax difference between your household income and that of your partner.

    between your household income and that of your company.
  description.fr: >
    Le résultat de votre entreprise est imposé à l’impôt sur le revenu, comme
    les

    autres revenus de votre foyer.


    Le résultat est déterminé lors du remplissage de la **liasse fiscale** (aussi

    appelée déclaration de résultat). C’est l’expert-comptable qui s’en charge.


    Si votre entreprise gagne de l’argent, le résultat est appelé **bénéfice**. Il

    est ajouté aux autres revenus imposables (s’ils existent) :

    **votre impôt sur le revenu est plus élevé**.


    Si votre entreprise perd de l’argent, le résultat est appelé **déficit**. Il

    vient réduire le montant du revenu imposable de votre ménage :

    **votre impôt sur le revenu est moins élevé**.


    À noter : avec l’imposition sur le revenu, il n’y a pas de différence fiscale

    entre les revenus de votre foyer et ceux de votre entreprise.
