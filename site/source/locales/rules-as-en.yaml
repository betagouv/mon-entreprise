      description.en: >
        [automatic] The "support functions" rate enables employers who request
        it to benefit from a reduced AT/MP contribution rate for employees not
        exposed to the establishment's main risk. This rate is reserved for
        employees whose main function is administrative support.


        The following are considered administrative support functions:


        - secretarial work

        - reception ;

        - accounting ;

        - legal affairs

        - financial management

        - human resources.
      description.fr: >
        Le taux « fonctions support » permet à l’employeur qui le demande de
        bénéficier d’un taux de cotisation AT/MP réduit pour les salariés non
        exposés au risque principal de l’établissement. Il est réservé aux
        salariés occupant à titre principal une fonction support de nature
        administrative.


        Sont considérées comme fonctions supports de nature administrative :


        - le secrétariat ;

        - l’accueil ;

        - la comptabilité ;

        - les affaires juridiques ;

        - la gestion financière ;

        - les ressources humaines.
      question.en:
        '[automatic] Does the employee perform an administrative support
        function?'
      question.fr: Le salarié occupe-t-il une fonction support de nature administrative ?
      titre.en: '[automatic] support function rate'
      titre.fr: taux fonctions support
