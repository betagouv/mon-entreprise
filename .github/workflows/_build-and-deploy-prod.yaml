name: Build et déploiement production
# Workflow réutilisable. Aucun ref n'est accepté en input pour éviter les
# warnings CodeQL "Checkout of untrusted code in a privileged context" : le
# checkout par défaut résout au bon commit selon le contexte du caller
# (release, push master, schedule).
on:
  workflow_call:

permissions:
  contents: read
  statuses: write
  deployments: write

jobs:
  build:
    runs-on: ubuntu-22.04
    environment: master
    env:
      API_BASE_URL: https://mon-entreprise-api.osc-fr1.scalingo.io
      SERVER_BASE_URL: https://mon-entreprise-server.osc-fr1.scalingo.io
      VITE_FR_BASE_URL: https://mon-entreprise.urssaf.fr
      VITE_EN_BASE_URL: https://mycompanyinfrance.urssaf.fr
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/install
        env:
          GITHUB_API_SECRET: ${{ secrets.GITHUB_TOKEN }}
          ATINTERNET_API_SECRET_KEY: ${{ secrets.ATINTERNET_API_SECRET_KEY }}
          ATINTERNET_API_ACCESS_KEY: ${{ secrets.ATINTERNET_API_ACCESS_KEY }}
          CRISP_API_IDENTIFIER: ${{ secrets.CRISP_API_IDENTIFIER }}
          CRISP_API_KEY: ${{ secrets.CRISP_API_KEY }}
          CRISP_WEBSITE_ID: ${{ secrets.CRISP_WEBSITE_ID }}
      - name: Build app
        run: yarn workspace site build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          VITE_AT_INTERNET_SITE_ID: ${{ vars.VITE_AT_INTERNET_SITE_ID }}
          VITE_ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          VITE_ALGOLIA_SEARCH_KEY: ${{ secrets.ALGOLIA_SEARCH_KEY }}
          VITE_ALGOLIA_INDEX_PREFIX: monentreprise-master-
          VITE_GITHUB_REF: ${{ github.ref }}
          VITE_GITHUB_HEAD_REF: ''
          VITE_GITHUB_SHA: ${{ github.sha }}
      - name: Build app SSR
        run: yarn workspace site build:ssr
      - name: Prerender common routes
        run: yarn workspace site build:prerender --netlify-toml-path ./netlify.base.toml
      - name: Replace site placeholders in netlify.toml redirection file
        run: |
          cp site/netlify.base.toml site/netlify.toml
          sed -i "s|:API_URL|$API_BASE_URL|g" site/netlify.toml
          sed -i "s|:SERVER_URL|$SERVER_BASE_URL|g" site/netlify.toml
          sed -i "s|:SITE_FR|$VITE_FR_BASE_URL|g" site/netlify.toml
          sed -i "s|:SITE_EN|$VITE_EN_BASE_URL|g" site/netlify.toml
      - name: Update Algolia index
        run: yarn workspace site algolia:update
        env:
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_KEY: ${{ secrets.ALGOLIA_ADMIN_KEY }}
          ALGOLIA_SEARCH_KEY: ${{ secrets.ALGOLIA_SEARCH_KEY }}
          ALGOLIA_INDEX_PREFIX: monentreprise-master-
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: static-site
          path: |
            site/dist/**
            site/netlify.toml
          if-no-files-found: error

  build-storybook:
    runs-on: ubuntu-22.04
    env:
      VITE_FR_BASE_URL: https://mon-entreprise.urssaf.fr
      VITE_EN_BASE_URL: https://mycompanyinfrance.urssaf.fr
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/install
        env:
          GITHUB_API_SECRET: ${{ secrets.GITHUB_TOKEN }}
          ATINTERNET_API_SECRET_KEY: ${{ secrets.ATINTERNET_API_SECRET_KEY }}
          ATINTERNET_API_ACCESS_KEY: ${{ secrets.ATINTERNET_API_ACCESS_KEY }}
          CRISP_API_IDENTIFIER: ${{ secrets.CRISP_API_IDENTIFIER }}
          CRISP_API_KEY: ${{ secrets.CRISP_API_KEY }}
          CRISP_WEBSITE_ID: ${{ secrets.CRISP_WEBSITE_ID }}
      - name: Build Storybook
        run: yarn workspace site build:storybook
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: static-storybook
          path: |
            site/storybook-static/**
          if-no-files-found: error

  deploy-prod:
    needs: [build, build-storybook]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: static-site
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: static-storybook
          path: dist/dev/storybook
      - id: deploy-netlify
        uses: nwtgck/actions-netlify@4cbaf4c08f1a7bfa537d6113472ef4424e4eb654 # v3.0.0
        with:
          publish-dir: './dist'
          netlify-config-path: ./netlify.toml
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          enable-commit-status: true
          enable-commit-comment: false
          github-deployment-environment: master
          deploy-message: Deploy production branch
          fails-without-credentials: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 3
