name: PR clean up
# Utilise pull_request_target (au lieu de pull_request) pour avoir accès aux secrets
# même pour les PR de fork. Sûr car on ne checkout pas le code du fork — seuls les
# scripts de master sont exécutés pour nettoyer l'index Algolia temporaire.
on:
  pull_request_target:
    types: [closed]

permissions:
  contents: read

jobs:
  deploy-context:
    runs-on: ubuntu-22.04
    outputs:
      env-name: ${{ steps.deploy-env.outputs.name }}
    steps:
      - id: deploy-env
        run: echo "name=${{ github.event.number }}" >> $GITHUB_OUTPUT

  algolia-rm-temp-index:
    needs: deploy-context
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/install
      - name: Remove temporary Algolia index
        run: yarn workspace site algolia:clean
        env:
          ALGOLIA_APP_ID: ${{ vars.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_KEY: ${{ secrets.ALGOLIA_ADMIN_KEY }}
          ALGOLIA_INDEX_PREFIX: monentreprise-${{ needs.deploy-context.outputs.env-name }}-
