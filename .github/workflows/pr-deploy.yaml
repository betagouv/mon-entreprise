name: Déploiement PR
on:
  workflow_run:
    workflows: ['Vérification PR']
    types: [completed]

permissions:
  contents: read
  statuses: write
  pull-requests: write
  deployments: write
  actions: read

jobs:
  deploy-context:
    if: >-
      github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-22.04
    outputs:
      pr_number: ${{ steps.pr-context.outputs.pr_number }}
      env_name: ${{ steps.pr-context.outputs.env_name }}
      fr_url: ${{ steps.pr-context.outputs.fr_url }}
      en_url: ${{ steps.pr-context.outputs.en_url }}
    steps:
      - name: Download PR context artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pr-context
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Read PR context
        id: pr-context
        run: |
          echo "pr_number=$(jq -r .pr_number pr-context.json)" >> $GITHUB_OUTPUT
          echo "env_name=$(jq -r .env_name pr-context.json)" >> $GITHUB_OUTPUT
          echo "fr_url=$(jq -r .fr_url pr-context.json)" >> $GITHUB_OUTPUT
          echo "en_url=$(jq -r .en_url pr-context.json)" >> $GITHUB_OUTPUT

  algolia-push:
    needs: deploy-context
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/install
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: algolia-data
          path: site
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Push Algolia index
        run: yarn workspace site algolia:push
        env:
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_KEY: ${{ secrets.ALGOLIA_ADMIN_KEY }}
          ALGOLIA_INDEX_PREFIX: monentreprise-${{ needs.deploy-context.outputs.env_name }}-

  deploy-preview:
    needs: deploy-context
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        site: ['', 'en']
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: static-site
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: static-storybook
          path: dist/dev/storybook
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - id: deploy-netlify
        uses: nwtgck/actions-netlify@4cbaf4c08f1a7bfa537d6113472ef4424e4eb654 # v3.0.0
        with:
          publish-dir: './dist'
          netlify-config-path: ./netlify.toml
          production-deploy: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          enable-commit-status: true
          enable-commit-comment: false
          github-deployment-environment: ${{ needs.deploy-context.outputs.env_name }}
          alias: ${{ needs.deploy-context.outputs.env_name }}${{ matrix.site && format('-{0}', matrix.site) }}
          deploy-message: PR #${{ needs.deploy-context.outputs.pr_number }} (${{ matrix.site || 'fr' }})
          fails-without-credentials: true
          enable-pull-request-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 3

  post-comment:
    needs: [deploy-preview, deploy-context]
    runs-on: ubuntu-22.04
    steps:
      - name: Find Comment
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4.0.0
        id: find-comment
        with:
          issue-number: ${{ needs.deploy-context.outputs.pr_number }}
          comment-author: 'github-actions[bot]'
          body-includes: netlify
      - name: Create comment
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ needs.deploy-context.outputs.pr_number }}
          edit-mode: replace
          body: |
            La branche est déployée !

            - mon-entreprise : ${{ needs.deploy-context.outputs.fr_url }}
            - mycompanyinfrance : ${{ needs.deploy-context.outputs.en_url }}
            - storybook : ${{ needs.deploy-context.outputs.fr_url }}/dev/storybook/ ([version EN](${{ needs.deploy-context.outputs.en_url }}/dev/storybook/))
            - API : ${{ needs.deploy-context.outputs.fr_url }}/api/v1/doc/
